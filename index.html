<title>Durchwahlliste</title>
<style>
  :root{
    --bg:#F2F4F3; --surface:#FFFFFF; --ink:#15201E; --muted:#5C6B68; --line:#E3E8E6;
    --accent:#0F6E63; --accent-ink:#FFFFFF; --accent-soft:#E2F0ED;
    --unit:#9A5B2B; --unit-soft:#F3E9DF;
    --danger:#B4452F;
    --radius:14px; --shadow:0 1px 2px rgba(21,32,30,.05), 0 8px 24px rgba(21,32,30,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.4;padding-bottom:100px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  header{position:sticky;top:0;z-index:30;background:var(--bg);
    padding:max(14px,env(safe-area-inset-top)) 0 0;border-bottom:1px solid var(--line);}
  .titlebar{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand h1{font-size:20px;font-weight:680;letter-spacing:-.01em;margin:0}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);transform:translateY(-2px)}
  .menu-btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);
    font:inherit;font-size:13px;font-weight:560;padding:7px 12px;border-radius:999px;cursor:pointer;}
  .menu-btn:active{transform:scale(.97)}

  .search{margin-top:12px;position:relative}
  .search input{width:100%;font:inherit;font-size:16px;padding:12px 14px 12px 40px;
    border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);outline:none;}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}

  .tabs{display:flex;gap:4px;margin:12px 0 14px;padding:4px;background:#E5EAE8;border-radius:12px}
  .tab{flex:1;appearance:none;border:none;background:none;font:inherit;font-size:13px;font-weight:600;
    line-height:1.2;color:var(--muted);padding:9px 6px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(21,32,30,.14)}

  .list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .card-head{display:flex;align-items:center;gap:12px;padding:12px 12px 10px}
  .ini{flex:0 0 auto;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;font-weight:640;font-size:14px;letter-spacing:.02em}
  .ini-p{background:var(--accent-soft);color:var(--accent)}
  .ini-u{background:var(--unit-soft);color:var(--unit)}
  .who{flex:1 1 auto;min-width:0}
  .who .name{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .sub{font-size:13px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .edit{appearance:none;flex:0 0 auto;width:36px;height:36px;border:none;background:none;color:var(--muted);
    cursor:pointer;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .edit:active{background:var(--bg)}

  .nums{border-top:1px solid var(--line)}
  .numrow{display:flex;align-items:center;gap:12px;padding:9px 12px;border-top:1px solid var(--line)}
  .numrow:first-child{border-top:none}
  .nlabel{flex:0 0 auto;min-width:52px;font-size:12px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.03em}
  .ext{flex:1 1 auto;font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;
    font-variant-numeric:tabular-nums;font-size:17px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .call{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:38px;height:38px;
    border-radius:10px;background:var(--accent);color:var(--accent-ink);text-decoration:none}
  .call:active{filter:brightness(.94)}
  .nonum{padding:10px 12px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}

  .empty{text-align:center;color:var(--muted);padding:46px 20px;border:1px dashed var(--line);
    border-radius:var(--radius);margin-top:4px;background:var(--surface)}
  .empty strong{display:block;color:var(--ink);font-size:16px;margin-bottom:4px}

  .fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(22px,env(safe-area-inset-bottom));
    z-index:25;width:58px;height:58px;border-radius:18px;border:none;background:var(--accent);
    color:var(--accent-ink);font-size:30px;line-height:1;cursor:pointer;box-shadow:0 6px 18px rgba(15,110,99,.38)}
  .fab:active{transform:scale(.95)}

  .scrim{position:fixed;inset:0;z-index:40;background:rgba(21,32,30,.42);display:none;
    align-items:flex-end;justify-content:center}
  .scrim.open{display:flex}
  .sheet{width:100%;max-width:560px;background:var(--surface);border-radius:20px 20px 0 0;
    padding:20px 18px max(20px,env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(21,32,30,.18);
    max-height:88vh;overflow-y:auto}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px;margin:0 16px}}
  .sheet h2{margin:0 0 16px;font-size:18px;font-weight:660}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:540}
  .field input{width:100%;font:inherit;font-size:16px;padding:11px 12px;border:1px solid var(--line);
    border-radius:11px;background:var(--surface);color:var(--ink);outline:none}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .two{display:flex;gap:10px}.two .field{flex:1}
  .numedit{display:flex;gap:8px;margin-bottom:9px;align-items:center}
  .numedit input.lbl{flex:0 0 38%}
  .numedit input.val{flex:1}
  .numedit .rm{flex:0 0 auto;width:38px;height:42px;border:1px solid var(--line);background:var(--surface);
    border-radius:10px;color:var(--danger);cursor:pointer;font-size:18px}
  .addnum{appearance:none;border:1px dashed var(--line);background:none;color:var(--accent);font:inherit;
    font-size:14px;font-weight:560;padding:10px;border-radius:11px;cursor:pointer;width:100%;margin-top:2px}
  .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .btn{flex:1;font:inherit;font-size:16px;font-weight:580;padding:13px;border-radius:12px;cursor:pointer;border:1px solid var(--line)}
  .btn-primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .btn-ghost{background:var(--surface);color:var(--ink)}
  .btn-del{background:none;border:none;color:var(--danger);font:inherit;font-size:14px;font-weight:560;
    padding:12px;cursor:pointer;margin-top:4px;width:100%;text-align:center}

  .menu-row{display:flex;align-items:center;gap:12px;width:100%;padding:14px 4px;background:none;border:none;
    border-bottom:1px solid var(--line);font:inherit;font-size:16px;color:var(--ink);cursor:pointer;text-align:left}
  .menu-row:last-of-type{border-bottom:none}
  .menu-row .mi{color:var(--accent);display:flex}
  .menu-row small{display:block;color:var(--muted);font-size:13px;font-weight:400;margin-top:2px}

  .confirm-box{max-width:420px}
  .confirm-box p{margin:0 0 4px;font-size:15px;color:var(--ink)}
  .confirm-box .ch2{font-size:17px;font-weight:640;margin-bottom:8px}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;padding:11px 16px;border-radius:11px;font-size:14px;z-index:60;opacity:0;pointer-events:none;
    transition:.25s;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="titlebar">
      <div class="brand"><span class="dot"></span><h1>Durchwahl</h1></div>
      <button class="menu-btn" id="menuBtn">Teilen / Mehr</button>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="search" type="search" inputmode="search" placeholder="Suchen..." autocomplete="off">
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="people" id="tabPeople">Personen</button>
      <button class="tab" data-tab="units" id="tabUnits">Stationen &amp; Funktionsabteilungen</button>
    </div>
  </div>
</header>

<main class="wrap"><div class="list" id="list"></div></main>

<button class="fab" id="addBtn" aria-label="Hinzufügen">+</button>

<!-- Person form -->
<div class="scrim" id="personScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="personTitle">Neue Person</h2>
    <input type="hidden" id="p_id">
    <div class="field"><label for="p_title">Titel (optional)</label><input id="p_title" type="text" placeholder="z. B. Dr. med."></div>
    <div class="two">
      <div class="field"><label for="p_first">Vorname</label><input id="p_first" type="text"></div>
      <div class="field"><label for="p_last">Nachname</label><input id="p_last" type="text"></div>
    </div>
    <div class="two">
      <div class="field"><label for="p_dept">Abteilung</label><input id="p_dept" type="text" placeholder="z. B. Kardiologie"></div>
      <div class="field"><label for="p_role">Funktion</label><input id="p_role" type="text" placeholder="z. B. Oberärztin"></div>
    </div>
    <div class="field"><label for="p_dect">DECT-Nummer</label><input id="p_dect" type="tel" inputmode="tel"></div>
    <div class="field"><label for="p_mobile">Handynummer</label><input id="p_mobile" type="tel" inputmode="tel"></div>
    <div class="field"><label for="p_radio">Funknummer</label><input id="p_radio" type="tel" inputmode="tel"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="pCancel">Abbrechen</button>
      <button class="btn btn-primary" id="pSave">Speichern</button>
    </div>
    <button class="btn-del" id="pDelete" hidden>Person löschen</button>
  </div>
</div>

<!-- Unit form -->
<div class="scrim" id="unitScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="unitTitle">Neue Station / Funktionsabteilung</h2>
    <input type="hidden" id="u_id">
    <div class="field"><label for="u_name">Bezeichnung</label><input id="u_name" type="text" placeholder="z. B. EEG, EKG, Station 3A"></div>
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:540">Nummern</label>
    <div id="u_numbers"></div>
    <button class="addnum" id="addNum">+ Nummer hinzufügen</button>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="uCancel">Abbrechen</button>
      <button class="btn btn-primary" id="uSave">Speichern</button>
    </div>
    <button class="btn-del" id="uDelete" hidden>Eintrag löschen</button>
  </div>
</div>

<!-- Menu -->
<div class="scrim" id="menuScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2>Teilen &amp; Sichern</h2>
    <button class="menu-row" id="exportBtn">
      <span class="mi"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg></span>
      <span>Liste exportieren<small>Als Datei sichern und weitergeben</small></span>
    </button>
    <button class="menu-row" id="importBtn">
      <span class="mi"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m8 7 4-4 4 4"/><path d="M5 21h14"/></svg></span>
      <span>Liste importieren<small>Erhaltene Liste hinzufügen</small></span>
    </button>
    <input type="file" id="importFile" accept=".json,application/json" hidden>
    <div class="sheet-actions"><button class="btn btn-ghost" id="menuClose">Schließen</button></div>
  </div>
</div>

<!-- Reusable confirm -->
<div class="scrim" id="confirmScrim">
  <div class="sheet confirm-box" role="dialog" aria-modal="true">
    <div class="ch2" id="confirmTitle">Wirklich löschen?</div>
    <p id="confirmText"></p>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="confirmNo">Abbrechen</button>
      <button class="btn btn-primary" id="confirmYes" style="background:var(--danger);border-color:var(--danger)">Löschen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY="durchwahlliste.v2";
const $=s=>document.querySelector(s);

let store=load();
let tab="people";

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){const o=JSON.parse(raw);return {people:o.people||[],units:o.units||[]};}
    const old=localStorage.getItem("durchwahlliste.v1");
    if(old){
      const arr=JSON.parse(old);
      const people=(Array.isArray(arr)?arr:[]).map(c=>({id:uid(),title:"",first:"",last:c.name||"",dect:c.ext||"",mobile:"",radio:""}));
      return {people,units:[]};
    }
  }catch(e){}
  return {people:[],units:[]};
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(store));}
  catch(e){toast("Speichern nicht möglich - Liste am besten exportieren.");}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function personName(p){return [p.title,p.first,p.last].filter(Boolean).join(" ").trim();}
function personInitials(p){
  const a=(p.first||"").trim(), b=(p.last||"").trim();
  if(a||b) return ((a[0]||"")+(b[0]||"")).toUpperCase()||"-";
  return "-";
}
function unitInitials(name){const n=(name||"").trim();return n? n.slice(0,2).toUpperCase():"-";}
function personNumbers(p){
  return [["DECT",p.dect],["Handy",p.mobile],["Funk",p.radio]]
    .filter(x=>x[1]&&x[1].trim()).map(x=>({label:x[0],number:x[1].trim()}));
}
function personSub(p){return [p.dept,p.role].filter(Boolean).join(" · ");}

function callRow(label,number){
  return '<div class="numrow"><span class="nlabel">'+esc(label)+'</span>'
    +'<span class="ext">'+esc(number)+'</span>'
    +'<a class="call" href="tel:'+encodeURIComponent(number)+'" aria-label="'+esc(label)+' anrufen">'
    +'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'
    +'</a></div>';
}

function render(){
  const q=$("#search").value.trim().toLowerCase();
  const list=$("#list");
  $("#tabPeople").classList.toggle("active",tab==="people");
  $("#tabUnits").classList.toggle("active",tab==="units");

  if(tab==="people"){
    let items=store.people.slice().sort((a,b)=>personName(a).localeCompare(personName(b),"de"));
    if(q) items=items.filter(p=>((personName(p)+" "+personSub(p)).toLowerCase().includes(q))||personNumbers(p).some(n=>n.number.toLowerCase().includes(q)));
    if(!store.people.length){list.innerHTML=emptyBox("Noch keine Personen","Tippe auf das + unten rechts.");return;}
    if(!items.length){list.innerHTML=emptyBox("Nichts gefunden","Keine Treffer für deine Suche.");return;}
    list.innerHTML=items.map(p=>{
      const nums=personNumbers(p);
      return '<div class="card"><div class="card-head">'
        +'<div class="ini ini-p">'+esc(personInitials(p))+'</div>'
        +'<div class="who"><div class="name">'+esc(personName(p)||"Ohne Namen")+'</div>'+(personSub(p)?'<div class="sub">'+esc(personSub(p))+'</div>':'')+'</div>'
        +'<button class="edit" data-pid="'+p.id+'" aria-label="Bearbeiten"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>'
        +'</div>'+(nums.length?'<div class="nums">'+nums.map(n=>callRow(n.label,n.number)).join("")+'</div>':'<div class="nonum">Keine Nummer hinterlegt</div>')+'</div>';
    }).join("");
    list.querySelectorAll(".edit").forEach(b=>b.addEventListener("click",()=>openPerson(b.dataset.pid)));
  } else {
    let items=store.units.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","de"));
    if(q) items=items.filter(u=>(u.name||"").toLowerCase().includes(q)||(u.numbers||[]).some(n=>(n.number||"").toLowerCase().includes(q)||(n.label||"").toLowerCase().includes(q)));
    if(!store.units.length){list.innerHTML=emptyBox("Noch keine Einträge","Tippe auf das + unten rechts, z. B. für EEG, EKG oder eine Funktionsabteilung.");return;}
    if(!items.length){list.innerHTML=emptyBox("Nichts gefunden","Keine Treffer für deine Suche.");return;}
    list.innerHTML=items.map(u=>{
      const nums=(u.numbers||[]).filter(n=>n.number&&n.number.trim());
      return '<div class="card"><div class="card-head">'
        +'<div class="ini ini-u">'+esc(unitInitials(u.name))+'</div>'
        +'<div class="who"><div class="name">'+esc(u.name||"Ohne Bezeichnung")+'</div></div>'
        +'<button class="edit" data-uid="'+u.id+'" aria-label="Bearbeiten"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>'
        +'</div>'+(nums.length?'<div class="nums">'+nums.map(n=>callRow(n.label||"Tel",n.number.trim())).join("")+'</div>':'<div class="nonum">Keine Nummer hinterlegt</div>')+'</div>';
    }).join("");
    list.querySelectorAll(".edit").forEach(b=>b.addEventListener("click",()=>openUnit(b.dataset.uid)));
  }
}
function emptyBox(t,s){return '<div class="empty"><strong>'+esc(t)+'</strong>'+esc(s)+'</div>';}

$("#tabPeople").addEventListener("click",()=>{tab="people";render();});
$("#tabUnits").addEventListener("click",()=>{tab="units";render();});
$("#addBtn").addEventListener("click",()=>tab==="people"?openPerson(null):openUnit(null));

function openPerson(id){
  const p=id?store.people.find(x=>x.id===id):null;
  $("#personTitle").textContent=p?"Person bearbeiten":"Neue Person";
  $("#p_id").value=id||"";
  $("#p_title").value=p?p.title||"":"";
  $("#p_first").value=p?p.first||"":"";
  $("#p_last").value=p?p.last||"":"";
  $("#p_dept").value=p?p.dept||"":"";
  $("#p_role").value=p?p.role||"":"";
  $("#p_dect").value=p?p.dect||"":"";
  $("#p_mobile").value=p?p.mobile||"":"";
  $("#p_radio").value=p?p.radio||"":"";
  $("#pDelete").hidden=!id;
  $("#personScrim").classList.add("open");
  setTimeout(()=>$("#p_first").focus(),60);
}
$("#pCancel").addEventListener("click",()=>$("#personScrim").classList.remove("open"));
$("#personScrim").addEventListener("click",e=>{if(e.target===$("#personScrim"))$("#personScrim").classList.remove("open");});
$("#pSave").addEventListener("click",()=>{
  const last=$("#p_last").value.trim(), first=$("#p_first").value.trim();
  if(!last&&!first){toast("Bitte mindestens einen Namen eingeben.");$("#p_last").focus();return;}
  const obj={title:$("#p_title").value.trim(),first,last,dept:$("#p_dept").value.trim(),role:$("#p_role").value.trim(),dect:$("#p_dect").value.trim(),mobile:$("#p_mobile").value.trim(),radio:$("#p_radio").value.trim()};
  const id=$("#p_id").value;
  if(id){Object.assign(store.people.find(x=>x.id===id),obj);}
  else{store.people.push({id:uid(),...obj});}
  save();render();$("#personScrim").classList.remove("open");toast(id?"Gespeichert.":"Hinzugefügt.");
});
$("#pDelete").addEventListener("click",()=>{
  const id=$("#p_id").value;const p=store.people.find(x=>x.id===id);if(!p)return;
  askDelete("Person löschen?", personName(p)||"Diese Person", ()=>{
    store.people=store.people.filter(x=>x.id!==id);
    save();render();$("#personScrim").classList.remove("open");toast("Gelöscht.");
  });
});

function numRowEl(label,number){
  const div=document.createElement("div");div.className="numedit";
  div.innerHTML='<input class="lbl" type="text" placeholder="Label (z. B. Pflege)" value="'+esc(label||"")+'">'
    +'<input class="val" type="tel" inputmode="tel" placeholder="Nummer" value="'+esc(number||"")+'">'
    +'<button class="rm" type="button" aria-label="Entfernen">x</button>';
  div.querySelector(".rm").addEventListener("click",()=>div.remove());
  return div;
}
function openUnit(id){
  const u=id?store.units.find(x=>x.id===id):null;
  $("#unitTitle").textContent=u?"Station bearbeiten":"Neue Station / Funktionsabteilung";
  $("#u_id").value=id||"";
  $("#u_name").value=u?u.name||"":"";
  const box=$("#u_numbers");box.innerHTML="";
  const rows=(u&&u.numbers&&u.numbers.length)?u.numbers:[{label:"Pflege",number:""},{label:"Arzt",number:""}];
  rows.forEach(n=>box.appendChild(numRowEl(n.label,n.number)));
  $("#uDelete").hidden=!id;
  $("#unitScrim").classList.add("open");
  setTimeout(()=>$("#u_name").focus(),60);
}
$("#addNum").addEventListener("click",()=>$("#u_numbers").appendChild(numRowEl("","")));
$("#uCancel").addEventListener("click",()=>$("#unitScrim").classList.remove("open"));
$("#unitScrim").addEventListener("click",e=>{if(e.target===$("#unitScrim"))$("#unitScrim").classList.remove("open");});
$("#uSave").addEventListener("click",()=>{
  const name=$("#u_name").value.trim();
  if(!name){toast("Bitte eine Bezeichnung eingeben.");$("#u_name").focus();return;}
  const numbers=[...$("#u_numbers").querySelectorAll(".numedit")].map(r=>({
    label:r.querySelector(".lbl").value.trim(),number:r.querySelector(".val").value.trim()
  })).filter(n=>n.number);
  if(!numbers.length){toast("Bitte mindestens eine Nummer eingeben.");return;}
  const id=$("#u_id").value;
  if(id){const u=store.units.find(x=>x.id===id);u.name=name;u.numbers=numbers;}
  else{store.units.push({id:uid(),name,numbers});}
  save();render();$("#unitScrim").classList.remove("open");toast(id?"Gespeichert.":"Hinzugefügt.");
});
$("#uDelete").addEventListener("click",()=>{
  const id=$("#u_id").value;const u=store.units.find(x=>x.id===id);if(!u)return;
  askDelete("Eintrag löschen?", u.name||"Dieser Eintrag", ()=>{
    store.units=store.units.filter(x=>x.id!==id);
    save();render();$("#unitScrim").classList.remove("open");toast("Gelöscht.");
  });
});

let pendingYes=null;
function askDelete(title,what,onYes){
  $("#confirmTitle").textContent=title;
  $("#confirmText").textContent='"'+what+'" wird dauerhaft entfernt.';
  pendingYes=onYes;
  $("#confirmScrim").classList.add("open");
}
$("#confirmNo").addEventListener("click",()=>{$("#confirmScrim").classList.remove("open");pendingYes=null;});
$("#confirmScrim").addEventListener("click",e=>{if(e.target===$("#confirmScrim")){$("#confirmScrim").classList.remove("open");pendingYes=null;}});
$("#confirmYes").addEventListener("click",()=>{$("#confirmScrim").classList.remove("open");if(pendingYes){pendingYes();pendingYes=null;}});

$("#menuBtn").addEventListener("click",()=>$("#menuScrim").classList.add("open"));
$("#menuClose").addEventListener("click",()=>$("#menuScrim").classList.remove("open"));
$("#menuScrim").addEventListener("click",e=>{if(e.target===$("#menuScrim"))$("#menuScrim").classList.remove("open");});
$("#exportBtn").addEventListener("click",()=>{
  if(!store.people.length&&!store.units.length){toast("Liste ist leer.");return;}
  const blob=new Blob([JSON.stringify({type:"durchwahlliste",version:2,people:store.people,units:store.units},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="durchwahlliste.json";a.click();URL.revokeObjectURL(url);
  $("#menuScrim").classList.remove("open");toast("Exportiert - Datei kann jetzt geteilt werden.");
});
$("#importBtn").addEventListener("click",()=>$("#importFile").click());
$("#importFile").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const o=JSON.parse(r.result);let a=0;
      (o.people||[]).forEach(p=>{if(p&&(p.first||p.last)){const dup=store.people.some(x=>personName(x)===personName(p)&&x.dect===(p.dect||""));if(!dup){store.people.push({id:uid(),title:p.title||"",first:p.first||"",last:p.last||"",dept:p.dept||"",role:p.role||"",dect:p.dect||"",mobile:p.mobile||"",radio:p.radio||""});a++;}}});
      (o.units||[]).forEach(u=>{if(u&&u.name){const dup=store.units.some(x=>x.name===u.name);if(!dup){store.units.push({id:uid(),name:u.name,numbers:(u.numbers||[]).map(n=>({label:n.label||"",number:String(n.number||"")})).filter(n=>n.number)});a++;}}});
      const legacy=Array.isArray(o)?o:o.contacts;
      if(Array.isArray(legacy)) legacy.forEach(c=>{if(c&&c.name){const dup=store.people.some(x=>x.last===c.name&&x.dect===(c.ext||""));if(!dup){store.people.push({id:uid(),title:"",first:"",last:c.name,dect:c.ext||"",mobile:"",radio:""});a++;}}});
      save();render();$("#menuScrim").classList.remove("open");
      toast(a?a+" Einträge importiert.":"Keine neuen Einträge.");
    }catch(err){toast("Datei konnte nicht gelesen werden.");}
    e.target.value="";
  };
  r.readAsText(file);
});

let tt;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2200);}
$("#search").addEventListener("input",render);
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".scrim.open").forEach(s=>s.classList.remove("open"));});
render();
</script>
</body>
</html>
